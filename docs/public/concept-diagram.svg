<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#151515" rx="12"/>
  <defs>
    <linearGradient id="g-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7733" />
    </marker>
  </defs>
  
  <g font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- Unity Project -->
    <rect x="50" y="160" width="160" height="80" rx="8" fill="#2a2a2a" stroke="#ff5500" stroke-width="2"/>
    <text x="130" y="205">Unity Project</text>
    
    <!-- AvatarBinder -->
    <rect x="300" y="140" width="200" height="120" rx="12" fill="#2a2a2a" stroke="url(#g-orange)" stroke-width="4"/>
    <text x="400" y="205">AvatarBinder</text>
    
    <!-- Library -->
    <rect x="600" y="80" width="140" height="60" rx="8" fill="#ff5500"/>
    <text x="670" y="117" font-size="18">ライブラリ</text>
    
    <!-- Categories -->
    <rect x="580" y="150" width="60" height="40" rx="4" fill="#333"/>
    <text x="610" y="177" font-size="14" font-weight="normal">男性</text>
    <rect x="650" y="150" width="60" height="40" rx="4" fill="#333"/>
    <text x="680" y="177" font-size="14" font-weight="normal">女性</text>
    <rect x="720" y="150" width="60" height="40" rx="4" fill="#333"/>
    <text x="750" y="177" font-size="14" font-weight="normal">...</text>
    
    <!-- Batch Tools -->
    <rect x="600" y="260" width="140" height="60" rx="8" fill="#ff7733"/>
    <text x="670" y="297" font-size="18">一括ツール</text>
  </g>
  
  <g stroke="#ff7733" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 210 200 L 290 200"/>
    <path d="M 500 170 Q 550 110 590 110"/>
    <path d="M 500 230 Q 550 290 590 290"/>
    <!-- line from library to cats -->
    <path d="M 670 140 L 670 145" marker-end="none"/> 
  </g>
</svg>
