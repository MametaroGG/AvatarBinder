<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#151515" rx="12"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7733" />
    </marker>
  </defs>
  
  <g font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- Start -->
    <rect x="300" y="40" width="200" height="50" rx="25" fill="#ff5500"/>
    <text x="400" y="70">登録先は？</text>
    
    <!-- Target Split -->
    <rect x="60" y="150" width="200" height="60" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <text x="160" y="186">特定のPrefab</text>
    
    <rect x="300" y="150" width="200" height="60" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <text x="400" y="186">フォルダ単位</text>
    
    <rect x="540" y="150" width="200" height="60" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
    <text x="640" y="186">シーン上のアバター</text>
    
    <!-- Actions -->
    <rect x="60" y="260" width="200" height="60" rx="8" fill="#333" stroke="#ff7733" stroke-width="2"/>
    <text x="160" y="296">Drop ZoneへD&amp;D</text>
    
    <rect x="300" y="260" width="200" height="60" rx="8" fill="#333" stroke="#ff7733" stroke-width="2"/>
    <text x="400" y="296">フォルダ一括スキャン</text>
    
    <rect x="540" y="260" width="200" height="60" rx="8" fill="#333" stroke="#ff7733" stroke-width="2"/>
    <text x="640" y="296">選択してボタン押下</text>
    
    <!-- Result -->
    <rect x="300" y="380" width="200" height="60" rx="30" fill="#ff5500"/>
    <text x="400" y="416">ライブラリへ追加</text>
  </g>
  
  <g stroke="#ff7733" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <!-- Branching -->
    <path d="M 400 90 L 400 110"/>
    <path d="M 400 110 L 160 110 L 160 140"/>
    <path d="M 400 110 L 400 140"/>
    <path d="M 400 110 L 640 110 L 640 140"/>
    
    <!-- Vertical down -->
    <path d="M 160 210 L 160 250"/>
    <path d="M 400 210 L 400 250"/>
    <path d="M 640 210 L 640 250"/>
    
    <!-- To Result -->
    <path d="M 160 320 Q 160 350 300 390"/>
    <path d="M 400 320 L 400 370"/>
    <path d="M 640 320 Q 640 350 500 390"/>
  </g>
</svg>
