<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#151515" rx="12"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7733" />
    </marker>
  </defs>
  
  <g font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <!-- Start -->
    <rect x="300" y="40" width="200" height="60" rx="8" fill="#2a2a2a" stroke="#ff5500" stroke-width="2"/>
    <text x="400" y="76">登録済みのPrefab</text>
    
    <!-- Issues -->
    <rect x="50" y="160" width="220" height="70" rx="8" fill="#442222" stroke="#ff3333" stroke-width="2"/>
    <text x="160" y="190">パス変更（Missing）</text>
    <text x="160" y="215" font-size="14" fill="#ff9999">-> Repairツール</text>
    
    <rect x="290" y="160" width="220" height="70" rx="8" fill="#443322" stroke="#ff9900" stroke-width="2"/>
    <text x="400" y="190">重複登録の発生</text>
    <text x="400" y="215" font-size="14" fill="#ffcc99">-> Dedupeツール</text>
    
    <rect x="530" y="160" width="220" height="70" rx="8" fill="#223344" stroke="#41d1ff" stroke-width="2"/>
    <text x="640" y="190">衣装や状態の変更</text>
    <text x="640" y="215" font-size="14" fill="#aeeeff">-> サムネ再撮影</text>
    
    <!-- Result -->
    <rect x="300" y="320" width="200" height="60" rx="30" fill="#ff5500"/>
    <text x="400" y="356">ワンクリックで解決</text>
  </g>
  
  <g stroke="#ff7733" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <!-- from Start -->
    <path d="M 400 100 Q 160 120 160 150"/>
    <path d="M 400 100 L 400 150"/>
    <path d="M 400 100 Q 640 120 640 150"/>
    
    <!-- to Result -->
    <path d="M 160 230 Q 160 280 300 340"/>
    <path d="M 400 230 L 400 310"/>
    <path d="M 640 230 Q 640 280 500 340"/>
  </g>
</svg>
