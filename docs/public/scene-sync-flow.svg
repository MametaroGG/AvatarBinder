<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'Segoe UI', 'Hiragino Sans', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8800;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44bb44;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#44bb44;stop-opacity:0.1"/>
    </linearGradient>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ff6600"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ff8800"/></marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" rx="16" fill="#151515"/>

  <!-- Step 1 -->
  <rect x="10" y="40" width="190" height="120" rx="12" fill="url(#g1)" stroke="#ff6600" stroke-width="2"/>
  <text x="105" y="72" text-anchor="middle" fill="#ff6600" font-size="13" font-weight="bold">STEP 1</text>
  <text x="105" y="98" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">シーン上で</text>
  <text x="105" y="118" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">衣装を着せ替え</text>
  <text x="105" y="146" text-anchor="middle" fill="#aaaaaa" font-size="11">可視/不可視を調整</text>

  <!-- Arrow 1 -->
  <path d="M210 100 L260 100" stroke="#ff6600" stroke-width="2" fill="none" marker-end="url(#arrow1)"/>

  <!-- Step 2 -->
  <rect x="265" y="40" width="190" height="120" rx="12" fill="url(#g2)" stroke="#ff8800" stroke-width="2"/>
  <text x="360" y="72" text-anchor="middle" fill="#ff8800" font-size="13" font-weight="bold">STEP 2</text>
  <text x="360" y="98" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">シーン可視→</text>
  <text x="360" y="118" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">プリセット保存</text>
  <text x="360" y="146" text-anchor="middle" fill="#aaaaaa" font-size="11">見た目をツールに記録</text>

  <!-- Arrow 2 -->
  <path d="M465 100 L515 100" stroke="#ff8800" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 3 -->
  <rect x="520" y="40" width="190" height="120" rx="12" fill="url(#g3)" stroke="#44bb44" stroke-width="2"/>
  <text x="615" y="72" text-anchor="middle" fill="#44bb44" font-size="13" font-weight="bold">STEP 3</text>
  <text x="615" y="98" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">プリセットで</text>
  <text x="615" y="118" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">サムネ再撮影</text>
  <text x="615" y="146" text-anchor="middle" fill="#aaaaaa" font-size="11">サムネイルが最新に更新</text>
</svg>
